<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VULCAN PRO — Anvelopa de sticlă · Demo 3D interactiv</title>
  <meta name="description" content="Demo tehnologic: o anvelopă de sticlă randată live în browser. WebGL, refracție reală, cameră controlată de scroll.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%238fe3ff' stroke-width='4'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ffb36b'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#04080f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader">
    <div class="loader-logo">VULCAN<span>GLASS</span></div>
    <div class="loader-bar"><i></i></div>
  </div>

  <canvas id="webgl"></canvas>

  <header class="topbar">
    <div class="logo">VULCAN<span>GLASS</span></div>
    <div class="logo-sub">demo 3D · Flavius Vranău</div>
  </header>

  <main id="content">

    <section class="section s-hero">
      <div class="hero-caption">
        <p class="eyebrow">Anvelopa de sticlă</p>
        <p>Mișcă mouse-ul peste roată.<br>Apoi scrollează.</p>
      </div>
      <div class="scroll-hint"><i></i><span>Scroll</span></div>
    </section>

    <section class="section s-left">
      <div class="section-inner">
        <p class="eyebrow">01</p>
        <h2>Fiecare piesă,<br>la locul ei</h2>
      </div>
    </section>

    <section class="section s-right">
      <div class="section-inner">
        <p class="eyebrow">02</p>
        <h2>Echilibru perfect</h2>
      </div>
    </section>

    <section class="section s-left">
      <div class="section-inner">
        <p class="eyebrow">03</p>
        <h2>Transparență totală</h2>
      </div>
    </section>

    <section class="section s-final">
      <div class="section-inner final-inner">
        <h2>Construit live,<br>în browserul tău.</h2>
        <div class="cta-row">
          <a class="cta ghost" href="#">Vezi din nou</a>
        </div>
        <p class="credit">Flavius Vranău · Three.js + GSAP</p>
      </div>
    </section>

  </main>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
